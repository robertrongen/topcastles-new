<div class="top-regions-page">
  <section class="section">
    <h2>The regions with the most top castles</h2>
    <div class="table-container">
      <table mat-table [dataSource]="summaries()" matSort (matSortChange)="onSort($event)">

        <ng-container matColumnDef="rank">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let row; let i = index">{{ i + 1 }}</td>
        </ng-container>

        <ng-container matColumnDef="region">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Region</th>
          <td mat-cell *matCellDef="let row">{{ row.region }}</td>
        </ng-container>

        <ng-container matColumnDef="country">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Country</th>
          <td mat-cell *matCellDef="let row">
            <a [routerLink]="['/countries', row.country]">{{ row.country }}</a>
          </td>
        </ng-container>

        <ng-container matColumnDef="castleCount">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Castles</th>
          <td mat-cell *matCellDef="let row">{{ row.castleCount }}</td>
        </ng-container>

        <ng-container matColumnDef="totalScore">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Total Score</th>
          <td mat-cell *matCellDef="let row">{{ row.totalScore | number:'1.0-0' }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columns"></tr>
        <tr mat-row *matRowDef="let row; columns: columns;"></tr>
      </table>
    </div>
  </section>
</div>
