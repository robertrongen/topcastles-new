<div class="account-page">
  <h1>Account</h1>
  <p>Your session is stored locally in this browser. No login required.</p>
  @if (token) {
    <p class="token-hint">Token: <code>{{ token.slice(0, 8) }}…</code></p>
    @if (shareLink) {
      <div class="share-section">
        <input class="share-link-input" type="text" readonly [value]="shareLink" />
        <button mat-stroked-button (click)="copyShareLink()">
          <mat-icon>content_copy</mat-icon> Copy share link
        </button>
        <p class="share-hint">Open this link on another device to load your favorites there.</p>
      </div>
    }
  }
  <p>
    <a mat-stroked-button routerLink="/favorites">
      <mat-icon>bookmark</mat-icon> My Favorites
    </a>
  </p>
</div>
