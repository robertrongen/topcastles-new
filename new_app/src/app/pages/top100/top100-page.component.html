<div class="top100-page">
  <section class="section">
    <h2>The top 1000 of medieval castles</h2>
    <p>
      All castles ranked by score, derived from references used by topcastles.com and the visitors rating.
    </p>
    <app-view-toggle />
    @if (viewModeService.mode() === 'grid') {
      <app-castle-grid [castles]="top100()" />
    } @else {
      <app-castle-table [castles]="top100()" [columns]="displayedColumns" />
    }
  </section>
</div>
