<div class="country-detail-page">
  @if (loading()) {
    <p>Loading…</p>
  } @else if (!castles().length) {
    <h2>Country not found</h2>
    <p>No castles found for "{{ country() }}".</p>
    <a routerLink="/countries">Back to countries</a>
  } @else {
    <h2>Castles in {{ country() }}</h2>
    <p>{{ castles().length }} castles found</p>
    <app-castle-filter #cf [castles]="castles()" [fields]="filterFields" [initialFilters]="initialFilters()" />
    <app-view-toggle />
    @if (viewModeService.mode() === 'grid') {
      <app-castle-grid [castles]="cf.filtered()" />
    } @else {
      <app-castle-table [castles]="cf.filtered()" [columns]="displayedColumns" />
    }
  }
</div>
