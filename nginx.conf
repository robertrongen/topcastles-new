server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # Long-lived cache for hashed assets (Angular adds content hash to filenames)
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # JSON data files: cache for 1 hour (refreshed on each deploy)
    location /assets/data/ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # SPA fallback: unknown paths serve index.html so Angular routing works on hard refresh
    location / {
        try_files $uri $uri/ /index.html;
    }
}
